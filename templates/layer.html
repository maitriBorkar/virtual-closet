{% load static %}
<link rel="stylesheet" href="{% static 'style.css' %}">

<!DOCTYPE html>
<html>
<head>
    <title>Layer Your Clothes</title>
    <style>
        .layer-preview {
            position: relative;
            /* width: 300px;
            height: 400px; */
            width: 700px;
            height: 700px;
            margin: 30px auto;
            border: 1px solid #ccc;
            background-color: rgba(255, 255, 255, 0.637);
        }

        .layer-preview img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;         /* stretch to fit container width */
            height: 100%;        /* stretch to fit container height */
            object-fit: contain; /* maintain aspect ratio */
        }

        img.layer.top { z-index: 3; }
        img.layer.pants { z-index: 2; }
        img.layer.shoes { z-index: 1; }


        form {
            text-align: center;
            margin-bottom: 20px;
        }

        select, button {
            padding: 8px;
            margin: 5px;
        }
        .back-button {
            display: inline-block;
            margin-top: 20px;
            background-color: #8B4513;
            color: white;
            padding: 10px 18px;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: background-color 0.3s ease;
        }
        .back-button:hover {
            background-color: #5c3317;
        }

        .layer-preview img.layer.top {
            z-index: 3;
            top: 5%;
            left: 40%;
            transform: translateX(-50%);
            height: 30%;
        }

        .layer-preview img.layer.pants {
            z-index: 2;
            top: 33%;
            left: 40%;
            transform: translateX(-50%);
            height: 55%;
        }

        .layer-preview img.layer.shoes {
            z-index: 1;
            top: 30%;  
            left: 70%;
            transform: translateX(-50%);
            height: 25%;
        }
    </style>
</head>
<body class="bg">

    <h2 style="text-align: center; color: white;">Layer Your Clothes</h2>
    <h3 style="text-align: center; color: white;">!! For a better view remove the background of photos !!</h3>

    <form method="POST">
        {% csrf_token %}

        <label style="color:white;">Select Top:</label>
        <select name="top">
            <option value="">--Choose Top/Kurtis/Blouses--</option>
            {% for item in tops %}
                <option value="{{ item.id }}">{{ item.image.name }}</option>
            {% endfor %}
        </select>

        <label style="color:white;">Select Bottoms:</label>
        <select name="pants">
            <option value="">--Choose Pants--</option>
            {% for item in pants %}
                <option value="{{ item.id }}">{{ item.image.name }}</option>
            {% endfor %}
        </select>

        <label style="color:white;">Select Shoes:</label>
        <select name="shoes">
            <option value="">--Choose Shoes--</option>
            {% for item in shoes %}
                <option value="{{ item.id }}">{{ item.image.name }}</option>
            {% endfor %}
        </select>

        <button type="submit">Preview Outfit</button>
    </form>

    <div class="layer-preview">
        {% if top %}
            <img src="{{ top.image.url }}" class="layer top" alt="Top">
        {% endif %}
        {% if pants_selected %}
            <img src="{{ pants_selected.image.url }}" class="layer pants" alt="Pants">
        {% endif %}
        {% if shoes_selected %}
            <img src="{{ shoes_selected.image.url }}" class="layer shoes" alt="Shoes">
        {% endif %}
    </div>

    <div style="text-align: center;">
        <a href="{% url 'home' %}" class="back-button">← Back to Home</a>
    </div>
</body>
</html>
